name: Stocks Weekly Fundamental Pull

on:
  schedule:
    - cron: '30 12 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-weekly:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run weekly GPT web-news scan
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: |
          python scripts/update_stocks.py --mode weekly

      - name: Commit data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/data/*.json site/data/archive/*.json
          git diff --cached --quiet || git commit -m "chore: weekly fundamental news refresh"
          git push
